name: Publish Tiles

permissions:
  id-token: write
  contents: read

on:
  push:
    branches:
      - main

jobs:
  publish:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        skill:
          - error-handling
          - go-effective
          - go-proverbs
          - implement
          - python-style
          - review
          - security
          - setup-project
          - star-chamber
          - state-machine
          - typescript-style
          - validate
    steps:
      - uses: actions/checkout@v6
      - uses: tesslio/publish@main
        with:
          token: ${{ secrets.TESSL_API_TOKEN }}
          path: './plugins/pragma/skills/${{ matrix.skill }}'
